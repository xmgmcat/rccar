name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android (32 & 64 bit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 临时将阿里云镜像替换为官方仓库（不修改仓库中的文件）
      - name: Replace Aliyun mirrors with official repos (temporary)
        run: |
          # 备份原始文件（可选）
          cp android/build.gradle.kts android/build.gradle.kts.bak
          # 删除或注释所有包含 maven.aliyun.com 的行
          sed -i '/maven.aliyun.com/d' android/build.gradle.kts
          echo "Modified android/build.gradle.kts:"
          grep -E "repositories|google|mavenCentral" android/build.gradle.kts || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK for armeabi-v7a
        run: flutter build apk --release --target-platform android-arm

      - name: Save armeabi-v7a APK
        run: |
          mkdir -p build/apks/armv7
          cp build/app/outputs/flutter-apk/app-release.apk build/apks/armv7/app-armeabi-v7a-release.apk

      - name: Build APK for arm64-v8a
        run: flutter build apk --release --target-platform android-arm64

      - name: Save arm64-v8a APK
        run: |
          mkdir -p build/apks/arm64
          cp build/app/outputs/flutter-apk/app-release.apk build/apks/arm64/app-arm64-v8a-release.apk

      - name: Collect APKs
        run: |
          mkdir -p build/app/outputs/flutter-apk
          cp build/apks/armv7/*.apk build/app/outputs/flutter-apk/
          cp build/apks/arm64/*.apk build/app/outputs/flutter-apk/

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Build Windows (64-bit)
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      # 动态检测 Visual Studio 版本并设置 CMake 生成器
      - name: Build Windows release (auto-detect VS)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          if (-not $vsPath) {
            Write-Error "未找到 Visual Studio 安装"
            exit 1
          }
          
          $vsVersion = & $vswhere -latest -property catalog_productLineVersion
          $majorVersion = $vsVersion.Split('.')[0]

          $generator = switch ($majorVersion) {
            "17" { "Visual Studio 17 2022" }
            "16" { "Visual Studio 16 2019" }
            "15" { "Visual Studio 15 2017" }
            default { 
              Write-Error "不支持的 Visual Studio 版本: $majorVersion"
              exit 1
            }
          }
          echo "CMAKE_GENERATOR=$generator" >> $env:GITHUB_ENV
          flutter clean
          flutter build windows --release

      - name: Archive Windows build (zip)
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-release.zip

      - name: Upload Windows zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: windows-release.zip

  create-release:
    name: Create GitHub Release & Upload Assets
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (to read pubspec.yaml)
        uses: actions/checkout@v4

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: android-artifacts

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: windows-artifacts

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "app_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.app_version }}
          name: Release v${{ steps.get_version.outputs.app_version }}
          draft: false
          prerelease: false
          files: |
            android-artifacts/*.apk
            windows-artifacts/windows-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
